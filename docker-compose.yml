# Local backing services for development.
#
# Flow — local ↔ hosted:
#   • Local:  `make deps-up` runs these containers; point each feature's env var
#             at localhost (e.g. DATABASE_URL=postgres://...@localhost:5433/...).
#   • Hosted: don't run the local service — set the env var to the managed
#             provider's URL/key (Neon, Supabase, Upstash, Resend, …). The apps
#             only read from env, so switching is a one-line change with no code.
#
# Core service (postgres) starts with `docker compose up`. Optional services are
# behind profiles so they don't run unless asked:
#   docker compose --profile cache --profile mail up -d   (or `make deps-up-all`)
name: starterpack

services:
  # ── Database (wired today) ── hosted equivalent: Neon / Supabase / RDS ──────
  postgres:
    image: postgres:16-alpine
    container_name: starterpack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-starterpack}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Cache / rate-limit (scaffold for when needed) ── hosted: Upstash ────────
  redis:
    image: redis:7-alpine
    container_name: starterpack-redis
    restart: unless-stopped
    profiles: ["cache", "all"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  # ── Local email catcher (SMTP + web UI) ── hosted equivalent: Resend ────────
  # The @repo/email package uses Resend's HTTP API in production; Mailpit is for
  # local SMTP testing if/when you add an SMTP transport. Web UI on :8025.
  mailpit:
    image: axllent/mailpit:latest
    container_name: starterpack-mailpit
    restart: unless-stopped
    profiles: ["mail", "all"]
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    volumes:
      - mailpit-data:/data
    environment:
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db

volumes:
  postgres-data:
  redis-data:
  mailpit-data:
